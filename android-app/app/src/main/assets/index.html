<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AKATSUKI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--t-bg:#06080d;--t-bg2:#0c1019;--t-sf:#111827;--t-sf2:#1a2332;--t-sf3:#1f2b3d;
--t-bd:#243049;--t-bd2:#2d3d5c;--t-tx:#e2e8f0;--t-tx2:#94a3b8;--t-tx3:#64748b;
--t-gn:#10b981;--t-gn2:#059669;--t-rd:#ef4444;--t-rd2:#dc2626;
--t-bl:#3b82f6;--t-bl2:#2563eb;--t-yw:#f59e0b;--t-vl:#8b5cf6;
}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:var(--t-bg);color:var(--t-tx)}
input,select,button,textarea{font-family:inherit}
.font-mono{font-family:'JetBrains Mono',monospace}
.animate-fade-in{animation:fadeIn .3s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.animate-toast-in{animation:toastIn .25s ease-out}
.animate-pulse-dot{animation:pulse 2s infinite}
.animate-spin{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.ctrl-select{background:var(--t-bg);border:1px solid var(--t-bd);color:var(--t-tx);padding:4px 8px;border-radius:6px;font-size:11px;outline:none;font-family:'JetBrains Mono',monospace;cursor:pointer}
.ctrl-select:focus{border-color:var(--t-bl)}
input:focus{border-color:var(--t-bl)!important}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--t-bg)}
::-webkit-scrollbar-thumb{background:var(--t-bd);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--t-bd2)}
table{border-collapse:collapse;width:100%}
</style>
</head>
<body>
<div id="app"></div>
<script>
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const h = (tag, cls, attrs, ...children) => {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'disabled') { if (v) el.disabled = true; }
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => { if (c == null) return; el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
  return el;
};

let state = {
  authStep: 'credentials',
  credAccessToken: '', credMobile: '', credMpin: '', credUcc: '', credSaving: false,
  greeting: '', totp: '', loggingIn: false,
  sessionToken: '', sessionSid: '', baseUrl: '', viewToken: '', viewSid: '', accessToken: '',
  currentIndex: 'NIFTY', expiries: [], selectedExpiry: '', numStrikes: 5, spotPrice: 0,
  chain: [], chainLoading: false, showChain: false, showPositions: false, showOrders: false,
  selectedStrike: null, selectedIdx: -1, lots: 1,
  positions: [], orders: [], funds: {available:'--',used:'--',collateral:'--'},
  liveLtps: {}, connected: false, toasts: [], clock: '',
  instrumentsLoading: false,
};

let toastId = 0;
let spotIv = null, posIv = null, limitsIv = null, ltpIv = null, clockIv = null;
let precomputed = {};
let optionsDb = {};
let expiryList = {};
let spotCache = {};
let _reqId = 0;
const _pending = {};
const _dlPending = {};
const MONTHS_MAP = {JAN:1,FEB:2,MAR:3,APR:4,MAY:5,JUN:6,JUL:7,AUG:8,SEP:9,OCT:10,NOV:11,DEC:12};
const MONTHS_ARR = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

window.__nativeCallback = (id, status, b64) => {
  try {
    const text = atob(b64);
    if (_pending[id]) { _pending[id]({status, text, data: JSON.parse(text)}); delete _pending[id]; }
  } catch(e) {
    if (_pending[id]) { _pending[id]({status, text: b64, data: {error: 'Parse error'}}); delete _pending[id]; }
  }
};
window.__nativeDownloadDone = (id, path, size) => {
  if (_dlPending[id]) { _dlPending[id]({path, size}); delete _dlPending[id]; }
};

function nativeFetch(method, url, headers, body, contentType) {
  return new Promise(resolve => {
    const id = 'r' + (++_reqId);
    _pending[id] = resolve;
    NativeBridge.httpRequest(id, method, url, JSON.stringify(headers || {}), body || '', contentType || '');
  });
}
function nativeDownload(url, headers) {
  return new Promise(resolve => {
    const id = 'd' + (++_reqId);
    _dlPending[id] = resolve;
    NativeBridge.downloadText(id, url, JSON.stringify(headers || {}));
  });
}

function addToast(msg, type='info') {
  const id = ++toastId;
  state.toasts = [...state.toasts.slice(-4), {id, msg, type}];
  renderToasts();
  setTimeout(() => { state.toasts = state.toasts.filter(t => t.id !== id); renderToasts(); }, 4000);
}

function fmtPrice(p) { return p.toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtStrike(s) { return s.toLocaleString('en-IN'); }

function getNetQty(p) {
  const bq = parseInt(p.flBuyQty ?? p.cfBuyQty ?? p.buyQty ?? 0);
  const sq = parseInt(p.flSellQty ?? p.cfSellQty ?? p.sellQty ?? 0);
  if (p.netQty !== undefined) return parseInt(p.netQty);
  return bq - sq;
}
function getPnl(p) {
  const ba = parseFloat(p.buyAmt ?? p.cfBuyAmt ?? 0);
  const sa = parseFloat(p.sellAmt ?? p.cfSellAmt ?? 0);
  const nq = getNetQty(p);
  if (nq !== 0) {
    const sym = p.trdSym || '';
    const ltp = state.liveLtps[sym] || (p._ltp ? parseFloat(p._ltp) : 0);
    if (ltp > 0) {
      if (nq > 0) return (ltp * nq) - ba + sa;
      else return sa - (ltp * Math.abs(nq)) - ba;
    }
  }
  if (p._pnl !== undefined) return parseFloat(p._pnl);
  return sa - ba;
}

function quoteHeaders() {
  return {'Authorization': state.accessToken, 'Content-Type': 'application/json'};
}
function postHeaders() {
  return {
    'accept': 'application/json',
    'Auth': state.sessionToken,
    'Sid': state.sessionSid,
    'neo-fin-key': 'neotradeapi',
    'Content-Type': 'application/x-www-form-urlencoded',
  };
}
function postHeadersNoContent() {
  const h = {...postHeaders()};
  delete h['Content-Type'];
  return h;
}

async function doSaveCredentials() {
  if (!state.credAccessToken || !state.credMobile || !state.credMpin || !state.credUcc) { addToast('All fields are required','error'); return; }
  state.credSaving = true; render();
  NativeBridge.saveData('accessToken', state.credAccessToken);
  NativeBridge.saveData('mobileNumber', state.credMobile);
  NativeBridge.saveData('mpin', state.credMpin);
  NativeBridge.saveData('ucc', state.credUcc);
  addToast('Credentials saved!','success');
  state.authStep = 'totp';
  state.accessToken = state.credAccessToken;
  state.credSaving = false;
  render();
}

function loadSavedCredentials() {
  const at = NativeBridge.loadData('accessToken');
  const mob = NativeBridge.loadData('mobileNumber');
  const mpin = NativeBridge.loadData('mpin');
  const ucc = NativeBridge.loadData('ucc');
  if (at && mob && mpin && ucc) {
    state.credAccessToken = at; state.credMobile = mob; state.credMpin = mpin; state.credUcc = ucc;
    state.accessToken = at;
    return true;
  }
  return false;
}

async function doTotpLogin() {
  if (state.totp.length !== 6) { addToast('Enter 6-digit TOTP','error'); return; }
  state.loggingIn = true; render();
  try {
    const r1 = await nativeFetch('POST', 'https://mis.kotaksecurities.com/login/1.0/tradeApiLogin',
      {'Authorization': state.accessToken, 'neo-fin-key': 'neotradeapi', 'Content-Type': 'application/json'},
      JSON.stringify({mobileNumber: state.credMobile, ucc: state.credUcc, totp: state.totp}), 'application/json');
    const d1 = r1.data;
    if (d1?.data?.status === 'success') {
      state.viewToken = d1.data.token;
      state.viewSid = d1.data.sid;
    } else { addToast(d1?.message || d1?.data?.message || 'TOTP failed','error'); state.loggingIn = false; render(); return; }

    const r2 = await nativeFetch('POST', 'https://mis.kotaksecurities.com/login/1.0/tradeApiValidate',
      {'Authorization': state.accessToken, 'neo-fin-key': 'neotradeapi', 'Content-Type': 'application/json', 'sid': state.viewSid, 'Auth': state.viewToken},
      JSON.stringify({mpin: state.credMpin}), 'application/json');
    const d2 = r2.data;
    if (d2?.data?.status === 'success') {
      state.sessionToken = d2.data.token;
      state.sessionSid = d2.data.sid;
      state.baseUrl = d2.data.baseUrl || '';
      state.greeting = d2.data.greetingName || '';
      state.connected = true;
      addToast(`Welcome, ${state.greeting || 'Trader'}`, 'success');
      state.authStep = 'terminal';
      startTerminal();
    } else { addToast(d2?.message || d2?.data?.message || 'MPIN validation failed','error'); }
  } catch(e) { addToast('Connection error: ' + (e.message||''),'error'); }
  state.loggingIn = false; render();
}

async function doLogout() {
  if (!confirm('Logout and end trading session?')) return;
  stopTerminal();
  state.authStep = 'totp'; state.greeting = ''; state.totp = '';
  state.chain = []; state.positions = []; state.orders = []; state.spotPrice = 0;
  state.selectedStrike = null; state.liveLtps = {}; state.connected = false;
  state.sessionToken = ''; state.sessionSid = ''; state.baseUrl = '';
  addToast('Logged out','info');
  render();
}

function startTerminal() {
  loadLimits(); loadPositions(); loadOrders(); loadExpiriesFromDb(); refreshSpot();
  limitsIv = setInterval(loadLimits, 30000);
  posIv = setInterval(loadPositions, 5000);
  spotIv = setInterval(refreshSpot, 3000);
  preloadInstruments();
  render();
}
function stopTerminal() {
  if (spotIv) clearInterval(spotIv);
  if (posIv) clearInterval(posIv);
  if (limitsIv) clearInterval(limitsIv);
  if (ltpIv) clearInterval(ltpIv);
  spotIv = posIv = limitsIv = ltpIv = null;
}

async function refreshSpot() {
  if (!state.connected) return;
  const idx = state.currentIndex;
  const m = {NIFTY:['nse_cm','Nifty 50'], BANKNIFTY:['nse_cm','Nifty Bank'], SENSEX:['bse_cm','SENSEX'], FINNIFTY:['nse_cm','Nifty Fin Service']};
  const [seg, sym] = m[idx] || ['nse_cm','Nifty 50'];
  try {
    const url = `${state.baseUrl}/script-details/1.0/quotes/neosymbol/${seg}|${sym}/ltp`;
    const r = await nativeFetch('GET', url, quoteHeaders());
    const d = r.data;
    const arr = Array.isArray(d) ? d : [d];
    const ltp = parseFloat(arr[0]?.ltp || '0');
    if (ltp > 0) { state.spotPrice = ltp; spotCache[idx] = {price: ltp, ts: Date.now()}; renderSpotPrice(); }
  } catch {}
}

function getCachedSpot(idx) {
  const c = spotCache[idx];
  if (c && (Date.now() - c.ts) < 10000) return c.price;
  return 0;
}

function parseExpiryFromSymbol(ts, prefix) {
  const rest = ts.substring(prefix.length);
  const monthly = rest.match(/^(\d{2})([A-Z]{3})/);
  if (monthly) {
    const day = parseInt(monthly[1]), month = MONTHS_MAP[monthly[2]];
    if (month && day >= 1 && day <= 31) {
      const now = new Date();
      for (const yr of [now.getFullYear(), now.getFullYear()+1, now.getFullYear()-1]) {
        try {
          const d = new Date(yr, month-1, day);
          if (d.getDate() === day && d.getFullYear() >= 2025) return d;
        } catch {}
      }
    }
  }
  if (rest.length >= 5) {
    try {
      const yrVal = parseInt(rest.substring(0,2));
      const year = 2000 + yrVal;
      if (year < 2025 || year > 2030) return null;
      const remaining = rest.substring(2);
      if (remaining.length >= 4) {
        const m2 = parseInt(remaining.substring(0,2)), d2 = parseInt(remaining.substring(2,4));
        if (m2 >= 10 && m2 <= 12 && d2 >= 1 && d2 <= 31) {
          const dt = new Date(year, m2-1, d2);
          if (dt.getDate() === d2) return dt;
        }
      }
      if (remaining.length >= 3) {
        const m1 = parseInt(remaining[0]), d1 = parseInt(remaining.substring(1,3));
        if (m1 >= 1 && m1 <= 9 && d1 >= 1 && d1 <= 31) {
          const dt = new Date(year, m1-1, d1);
          if (dt.getDate() === d1) return dt;
        }
      }
    } catch {}
  }
  return null;
}

function formatExpiryLabel(d) {
  return `${String(d.getDate()).padStart(2,'0')}-${MONTHS_ARR[d.getMonth()]}-${d.getFullYear()}`;
}

function parseCsvAndBuildDb(csvText, indexName) {
  const key = indexName.toUpperCase();
  const lines = csvText.split('\n');
  if (lines.length < 2) return;
  const rawHeader = lines[0];
  const headers = rawHeader.split(',').map(h => h.trim().replace(/;/g,''));
  const colIdx = {};
  const needed = ['pSymbol','pExchSeg','pTrdSymbol','pOptionType','lLotSize','pSymbolName','pInstType','dStrikePrice'];
  needed.forEach(n => { const i = headers.indexOf(n); if (i >= 0) colIdx[n] = i; });

  const db = {};
  const expSet = {};
  const today = new Date(); today.setHours(0,0,0,0);

  for (let i = 1; i < lines.length; i++) {
    const line = lines[i];
    if (!line.trim()) continue;
    const cols = line.split(',');
    const symName = (cols[colIdx.pSymbolName] || '').toUpperCase().trim();
    const optType = (cols[colIdx.pOptionType] || '').trim();
    const instType = (cols[colIdx.pInstType] || '').toUpperCase().trim();
    if (symName !== key) continue;
    if (optType !== 'CE' && optType !== 'PE') continue;
    if (['NIFTY','BANKNIFTY','FINNIFTY'].includes(key) && instType !== 'OPTIDX') continue;

    const strikeRaw = parseFloat(cols[colIdx.dStrikePrice] || '0') / 100.0;
    if (strikeRaw <= 0) continue;

    const ts = (cols[colIdx.pTrdSymbol] || '').toUpperCase().trim();
    const d = parseExpiryFromSymbol(ts, key);
    if (!d || d.getFullYear() > 2030) continue;

    const label = formatExpiryLabel(d);
    const lot = parseInt(cols[colIdx.lLotSize] || '1') || 1;

    if (!db[label]) db[label] = {};
    if (!db[label][strikeRaw]) db[label][strikeRaw] = {};
    db[label][strikeRaw][optType] = {
      ts: ts,
      symbol: (cols[colIdx.pSymbol] || '').trim(),
      seg: (cols[colIdx.pExchSeg] || '').trim(),
      lot: lot
    };
    if (d >= today) expSet[label] = d;
  }

  optionsDb[key] = db;
  const sorted = Object.entries(expSet).sort((a,b) => a[1] - b[1]);
  expiryList[key] = sorted.map(([lbl, dt]) => ({label: lbl, date: dt}));
  const totalStrikes = Object.values(db).reduce((s, e) => s + Object.keys(e).length, 0);
  addToast(`${key}: ${sorted.length} expiries, ${totalStrikes} strikes loaded`, 'info');
}

async function preloadInstruments() {
  if (!state.connected) return;
  state.instrumentsLoading = true;
  try {
    const pathsUrl = `${state.baseUrl}/script-details/1.0/masterscrip/file-paths`;
    const r = await nativeFetch('GET', pathsUrl, quoteHeaders());
    const paths = r.data?.data?.filesPaths || [];

    for (const idx of ['NIFTY','BANKNIFTY','SENSEX']) {
      const csvKey = ['NIFTY','BANKNIFTY','FINNIFTY'].includes(idx) ? 'nse_fo' : 'bse_fo';
      const target = paths.find(p => p.includes(csvKey));
      if (!target) continue;
      addToast(`Downloading ${idx} instruments...`, 'info');
      const dl = await nativeDownload(target, quoteHeaders());
      if (!dl.path || dl.size < 1000) { addToast(`${idx} download failed`, 'error'); continue; }
      const CHUNK = 2000000;
      let csv = '';
      let offset = 0;
      const fileSize = parseInt(NativeBridge.getFileSize(dl.path));
      while (offset < fileSize) {
        const chunk = NativeBridge.readFileChunk(dl.path, offset, CHUNK);
        if (!chunk) break;
        csv += chunk;
        offset += CHUNK;
      }
      NativeBridge.deleteFile(dl.path);
      if (csv.length > 100) {
        const firstNl = csv.indexOf('\n');
        if (firstNl > 0) {
          const header = csv.substring(0, firstNl);
          const rest = csv.substring(firstNl + 1);
          const clean = header.split(',').map(c => c.trim().replace(/;/g,'')).join(',');
          csv = clean + '\n' + rest;
        }
        parseCsvAndBuildDb(csv, idx);
      }
      csv = '';
    }
  } catch(e) { addToast('Instrument load error: ' + (e.message||''), 'error'); }
  state.instrumentsLoading = false;
  loadExpiriesFromDb();
  loadChain();
}

function loadExpiriesFromDb() {
  const key = state.currentIndex.toUpperCase();
  const lst = expiryList[key] || [];
  const today = new Date(); today.setHours(0,0,0,0);
  state.expiries = lst.map(e => ({label: e.label, is_nearest: false}));
  let nearest = '';
  for (const e of lst) { if (e.date >= today) { nearest = e.label; break; } }
  state.expiries.forEach(e => { if (e.label === nearest) e.is_nearest = true; });
  if (nearest) state.selectedExpiry = nearest;
  else if (state.expiries.length > 0) state.selectedExpiry = state.expiries[0].label;
  renderControls();
}

function queryChainFast(indexName, spot, numStrikes, expiryLabel) {
  const key = indexName.toUpperCase();
  const db = optionsDb[key];
  if (!db) return {error: 'No data loaded yet'};
  const today = new Date(); today.setHours(0,0,0,0);
  let targetLabel = expiryLabel || '';
  if (!targetLabel) {
    const lst = expiryList[key] || [];
    for (const e of lst) { if (e.date >= today) { targetLabel = e.label; break; } }
    if (!targetLabel && lst.length > 0) targetLabel = lst[0].label;
  }
  if (!targetLabel) return {error: 'No expiries'};
  const strikesData = db[targetLabel];
  if (!strikesData) return {error: 'No data for ' + targetLabel};
  const allStrikes = Object.keys(strikesData).map(Number).sort((a,b) => a-b);
  if (allStrikes.length === 0) return {error: 'No strikes'};
  const stepMap = {NIFTY:50, BANKNIFTY:100, SENSEX:100, FINNIFTY:50};
  const step = stepMap[key] || 50;
  let atmIdx = 0, minDiff = Infinity;
  allStrikes.forEach((s, i) => { const d = Math.abs(s - spot); if (d < minDiff) { minDiff = d; atmIdx = i; } });
  const atm = allStrikes[atmIdx];
  const start = Math.max(0, atmIdx - numStrikes);
  const end = Math.min(allStrikes.length, atmIdx + numStrikes + 1);
  const selected = allStrikes.slice(start, end);
  let lotSize = 1;
  const chain = selected.map(strike => {
    const row = {strike, is_atm: Math.abs(strike - atm) < step/2};
    const sdata = strikesData[strike] || {};
    for (const ot of ['CE','PE']) {
      const p = ot.toLowerCase();
      const info = sdata[ot];
      if (info) {
        row[`${p}_ts`] = info.ts; row[`${p}_symbol`] = info.symbol; row[`${p}_seg`] = info.seg; row[`${p}_lot`] = info.lot;
        if (lotSize === 1) lotSize = info.lot;
      } else { row[`${p}_ts`] = ''; row[`${p}_symbol`] = ''; row[`${p}_seg`] = ''; row[`${p}_lot`] = 1; }
    }
    return row;
  });
  return {atm_strike: atm, spot_price: spot, chain, index: key, expiry: targetLabel, lot_size: lotSize};
}

async function loadChain() {
  state.chainLoading = true; state.selectedStrike = null; state.selectedIdx = -1;
  renderChain(); renderActionBar();
  const spot = state.spotPrice || getCachedSpot(state.currentIndex);
  if (spot <= 0) { state.chainLoading = false; renderChain(); return; }
  const result = queryChainFast(state.currentIndex, spot, state.numStrikes, state.selectedExpiry);
  if (result.error) { state.chain = []; state.chainLoading = false; renderChain(); return; }
  state.chain = result.chain || [];
  const atmIdx = state.chain.findIndex(row => row.is_atm);
  if (atmIdx >= 0) { state.selectedStrike = state.chain[atmIdx]; state.selectedIdx = atmIdx; }
  state.chainLoading = false;
  updatePrecomputed();
  renderChain(); renderActionBar(); renderMobileBar();
}

async function loadPositions() {
  if (!state.connected) return;
  try {
    const r = await nativeFetch('GET', `${state.baseUrl}/quick/user/positions`, postHeadersNoContent());
    const d = r.data;
    const st = (d?.stat||'').toLowerCase();
    if (st === 'ok' && d?.data?.length) {
      d.data.forEach(p => {
        const ba = parseFloat(p.buyAmt ?? p.cfBuyAmt ?? 0);
        const sa = parseFloat(p.sellAmt ?? p.cfSellAmt ?? 0);
        p._pnl = sa - ba;
      });
      state.positions = d.data;
    } else state.positions = [];
  } catch { state.positions = []; }
  renderPositions(); renderControls();
  startLtpPolling();
}

function startLtpPolling() {
  if (ltpIv) clearInterval(ltpIv);
  const fetchLtps = async () => {
    const open = state.positions.filter(p => getNetQty(p) !== 0);
    if (open.length === 0) return;
    const promises = open.map(async p => {
      const tok = p.tok || '';
      const seg = p.exSeg || 'nse_fo';
      const sym = p.trdSym || '';
      try {
        let ltp = 0;
        if (tok) {
          const url = `${state.baseUrl}/script-details/1.0/quotes/neosymbol/${seg}|${tok}/ltp`;
          const r = await nativeFetch('GET', url, quoteHeaders());
          const arr = Array.isArray(r.data) ? r.data : [r.data];
          ltp = parseFloat(arr[0]?.ltp || '0');
        }
        if (ltp <= 0 && sym) {
          const url = `${state.baseUrl}/script-details/1.0/quotes/neosymbol/${seg}|${sym}/ltp`;
          const r = await nativeFetch('GET', url, quoteHeaders());
          const arr = Array.isArray(r.data) ? r.data : [r.data];
          ltp = parseFloat(arr[0]?.ltp || '0');
        }
        if (ltp > 0) state.liveLtps[sym] = ltp;
      } catch {}
    });
    await Promise.all(promises);
    renderPositions();
  };
  fetchLtps();
  ltpIv = setInterval(fetchLtps, 1000);
}

async function loadOrders() {
  if (!state.connected) return;
  try {
    const r = await nativeFetch('GET', `${state.baseUrl}/quick/user/orders`, postHeadersNoContent());
    const d = r.data;
    const st = (d?.stat||'').toLowerCase();
    if (st === 'ok' && d?.data?.length) {
      state.orders = [...d.data].sort((a,b) => parseInt(b.boeSec||'0') - parseInt(a.boeSec||'0'));
    } else state.orders = [];
  } catch { state.orders = []; }
  renderOrders(); renderControls();
}

async function loadLimits() {
  if (!state.connected) return;
  try {
    const body = `jData=${JSON.stringify({seg:'ALL',exch:'ALL',prod:'ALL'})}`;
    const r = await nativeFetch('POST', `${state.baseUrl}/quick/user/limits`, postHeaders(), body, 'application/x-www-form-urlencoded');
    const d = r.data;
    if (d?.stat === 'Ok') {
      const fmt = v => '\u20B9' + parseFloat(v||0).toLocaleString('en-IN',{maximumFractionDigits:0});
      state.funds = {available:fmt(d.Net), used:fmt(d.MarginUsed), collateral:fmt(d.CollateralValue)};
      renderFunds();
    }
  } catch {}
}

function updatePrecomputed() {
  precomputed = {};
  if (!state.selectedStrike) return;
  const s = state.selectedStrike;
  for (const ot of ['CE','PE']) {
    const p = ot.toLowerCase();
    const ts = s[`${p}_ts`], es = s[`${p}_seg`], lotSize = s[`${p}_lot`] || 1, tok = s[`${p}_symbol`] || '';
    if (!ts) continue;
    for (const tt of ['B','S']) {
      const qty = lotSize * state.lots;
      precomputed[`${tt}_${ot}`] = {am:'NO',dq:'0',es,mp:'0',pc:'MIS',pf:'N',pr:'0',pt:'MKT',qt:String(qty),rt:'DAY',tp:'0',ts,tt,tok};
    }
  }
}

async function fire(tt, ot) {
  if (!state.selectedStrike) { addToast('Select a strike first','error'); return; }
  const key = `${tt}_${ot}`;
  const payload = precomputed[key];
  if (!payload) { addToast('No symbol available','error'); return; }
  const action = `${tt==='B'?'BUY':'SELL'} ${ot} ${state.selectedStrike.strike}`;
  addToast(`${action} x${state.lots} sent`, 'info');
  const t0 = Date.now();
  try {
    const jData = JSON.stringify(payload);
    const r = await nativeFetch('POST', `${state.baseUrl}/quick/order/rule/ms/place`, postHeaders(), `jData=${jData}`, 'application/x-www-form-urlencoded');
    const elapsed = Date.now() - t0;
    const d = r.data;
    if (d?.stat === 'Not_Ok') {
      const errMsg = (d.errMsg||'') + (d.emsg||'');
      if (errMsg.includes('LTP')) {
        try {
          const tok = payload.tok;
          let ltp = 0;
          if (tok) {
            const qr = await nativeFetch('GET', `${state.baseUrl}/script-details/1.0/quotes/neosymbol/${payload.es}|${tok}/ltp`, quoteHeaders());
            const arr = Array.isArray(qr.data) ? qr.data : [qr.data];
            ltp = parseFloat(arr[0]?.ltp || '0');
          }
          if (ltp > 0) {
            const pr = (ltp * (tt === 'B' ? 1.002 : 0.998)).toFixed(2);
            const retry = {...payload, pt:'L', pr};
            const r2 = await nativeFetch('POST', `${state.baseUrl}/quick/order/rule/ms/place`, postHeaders(), `jData=${JSON.stringify(retry)}`, 'application/x-www-form-urlencoded');
            const d2 = r2.data;
            if (d2?.stat === 'Ok' || d2?.nOrdNo) addToast(`${action} #${d2.nOrdNo||''} (${elapsed}ms)`, 'success');
            else addToast(`${action} failed: ${d2?.emsg||d2?.errMsg||''}`, 'error');
            loadOrders(); loadPositions();
            return;
          }
        } catch {}
      }
      addToast(`${action} failed: ${d.emsg||d.errMsg||''} (${elapsed}ms)`, 'error');
    } else if (d?.stat === 'Ok' || d?.nOrdNo) {
      addToast(`${action} #${d.nOrdNo||''} (${elapsed}ms)`, 'success');
    } else {
      addToast(`${action}: ${JSON.stringify(d).substring(0,100)}`, 'info');
    }
    loadOrders(); loadPositions();
  } catch(e) { addToast('Order error: ' + (e.message||''),'error'); }
}

function pickStrike(i) {
  if (!state.chain[i]) return;
  state.selectedStrike = state.chain[i];
  state.selectedIdx = i;
  updatePrecomputed();
  renderChain(); renderActionBar(); renderMobileBar();
}

function switchIndex(idx) {
  state.currentIndex = idx;
  state.selectedStrike = null; state.selectedIdx = -1; state.chain = [];
  loadExpiriesFromDb(); refreshSpot();
  if (spotIv) clearInterval(spotIv);
  spotIv = setInterval(refreshSpot, 3000);
  renderControls(); renderChain(); renderActionBar(); renderMobileBar();
  setTimeout(loadChain, 500);
}

async function closeAllPositions() {
  if (!confirm('Close ALL open positions at market price?')) return;
  const open = state.positions.filter(p => getNetQty(p) !== 0);
  if (open.length === 0) { addToast('No open positions','info'); return; }
  let closed = 0;
  for (const pos of open) {
    const nq = getNetQty(pos);
    const ts = pos.trdSym || '';
    const es = pos.seg || pos.exSeg || 'nse_fo';
    const tt = nq > 0 ? 'S' : 'B';
    const qty = Math.abs(nq);
    if (!ts) continue;
    const jData = JSON.stringify({am:'NO',dq:'0',es,mp:'0',pc:'MIS',pf:'N',pr:'0',pt:'MKT',qt:String(qty),rt:'DAY',tp:'0',ts,tt});
    try {
      await nativeFetch('POST', `${state.baseUrl}/quick/order/rule/ms/place`, postHeaders(), `jData=${jData}`, 'application/x-www-form-urlencoded');
      closed++;
    } catch {}
  }
  addToast(`Closing ${closed} position(s) at market...`, 'info');
  setTimeout(() => { loadPositions(); loadOrders(); }, 1500);
}

async function cancelOrd(n) {
  try {
    const jData = JSON.stringify({on:n,am:'NO'});
    const r = await nativeFetch('POST', `${state.baseUrl}/quick/order/cancel`, postHeaders(), `jData=${jData}`, 'application/x-www-form-urlencoded');
    if (r.data?.stat === 'Ok') addToast('Order cancelled','success');
    else addToast(r.data?.emsg || 'Cancel failed','error');
    loadOrders();
  } catch { addToast('Network error','error'); }
}

        <input id="inp-lots" type="number" value="${state.lots}" class="font-mono" style="width:56px;padding:4px 6px;border-radius:4px;text-align:center;font-size:16px;font-weight:700;outline:none;background:var(--t-bg);border:1px solid var(--t-bd);color:var(--t-tx)">
        <button onclick="state.lots=Math.min(50,state.lots+1);updatePrecomputed();renderActionBar();renderMobileBar();" style="width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:4px;font-weight:700;font-size:15px;background:var(--t-sf2);border:1px solid var(--t-bd);color:var(--t-tx);cursor:pointer">+</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-shrink:0;padding-left:24px;margin-left:20px;border-left:1px solid var(--t-bd)">
      <div style="display:flex;flex-direction:column;gap:6px">
        <button class="action-btn" ${hasPe?'':'disabled'} onclick="fire('B','PE')" style="padding:8px 20px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:white;letter-spacing:.05em;display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;min-width:112px;border:none;cursor:pointer;background:linear-gradient(135deg,#10b981,#059669);opacity:${hasPe?1:0.25};box-shadow:${hasPe?'0 1px 3px rgba(0,0,0,.3)':'none'}">\u25B2 BUY PE</button>
        <button class="action-btn" ${hasPe?'':'disabled'} onclick="fire('S','PE')" style="padding:8px 20px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:white;letter-spacing:.05em;display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;min-width:112px;border:none;cursor:pointer;background:linear-gradient(135deg,#ef4444,#dc2626);opacity:${hasPe?1:0.25};box-shadow:${hasPe?'0 1px 3px rgba(0,0,0,.3)':'none'}">\u25BC SELL PE</button>

          <kbd class="font-mono" style="display:inline-block;padding:1px 4px;border-radius:4px;font-size:9px;background:var(--t-sf3);border:1px solid var(--t-bd2);color:var(--t-tx2)">9</kbd> sell

}

function renderMainContent() { renderChain(); renderPositions(); renderOrders(); }

function renderChain() {
  const mc = $('#main-content'); if (!mc) return;
  let chainEl = $('#chain-panel');
  if (!state.showChain) { if (chainEl) chainEl.remove(); return; }
  if (!chainEl) { chainEl = h('div','',{id:'chain-panel',style:{overflowY:'auto',overflowX:'hidden',flexShrink:'0',maxHeight:'40vh',borderBottom:'1px solid var(--t-bd)'}}); mc.prepend(chainEl); }
  if (state.chainLoading) {
    chainEl.innerHTML = `<div style="padding:32px;text-align:center"><div style="display:inline-block;width:20px;height:20px;border-radius:50%;border:2px solid var(--t-bd);border-top-color:var(--t-bl)" class="animate-spin"></div></div>`;
    return;
  }
  if (state.chain.length === 0) {
    chainEl.innerHTML = `<div style="padding:40px;text-align:center;font-size:11px;color:var(--t-tx3)">${state.instrumentsLoading ? 'Loading instruments...' : state.expiries.length===0 ? 'Loading instruments...' : 'No data available'}</div>`;
    return;
  }
  let rows = state.chain.map((row, i) => {
    const sel = state.selectedIdx === i;
    const bg = sel ? 'rgba(245,158,11,.12)' : row.is_atm ? 'rgba(59,130,246,.08)' : 'transparent';
    const shadow = sel ? 'inset 3px 0 0 var(--t-yw)' : 'none';
    const bBot = row.is_atm ? '1px solid rgba(59,130,246,.2)' : '1px solid rgba(36,48,73,.5)';
    return `<tr data-i="${i}" style="cursor:pointer;background:${bg};box-shadow:${shadow};border-bottom:${bBot}">
      <td style="padding:6px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t-tx3)">${row.ce_ts||'\u2014'}</td>
      <td style="padding:6px;text-align:center;font-size:10px;color:var(--t-tx3)">${row.ce_ts?row.ce_lot:'\u2014'}</td>
      <td style="padding:6px;text-align:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:var(--t-yw)">${fmtStrike(row.strike)}${row.is_atm?'<span style="display:inline-block;font-size:8px;padding:1px 6px;margin-left:4px;border-radius:4px;font-weight:700;vertical-align:middle;letter-spacing:.05em;background:rgba(59,130,246,.2);color:var(--t-bl)">ATM</span>':''}</td>
      <td style="padding:6px;text-align:center;font-size:10px;color:var(--t-tx3)">${row.pe_ts?row.pe_lot:'\u2014'}</td>
      <td style="padding:6px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t-tx3)">${row.pe_ts||'\u2014'}</td>
    </tr>`;
  }).join('');
  chainEl.innerHTML = `<table><thead><tr style="position:sticky;top:0;z-index:2;background:var(--t-sf);border-bottom:1px solid var(--t-bd)">
    <th style="padding:6px;text-align:center;font-size:9px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;color:var(--t-gn)">CE Symbol</th>
    <th style="padding:6px;text-align:center;font-size:9px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;color:var(--t-tx3)">Lot</th>
    <th style="padding:6px;text-align:center;font-size:9px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;color:var(--t-yw)">Strike</th>
    <th style="padding:6px;text-align:center;font-size:9px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;color:var(--t-tx3)">Lot</th>
    <th style="padding:6px;text-align:center;font-size:9px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;color:var(--t-rd)">PE Symbol</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
  chainEl.querySelectorAll('tr[data-i]').forEach(tr => {
    tr.addEventListener('click', () => pickStrike(parseInt(tr.dataset.i)));
  });
}

function renderPositions() {
  const mc = $('#main-content'); if (!mc) return;
  let panel = $('#pos-ord-panel');
  if (!state.showPositions && !state.showOrders) { if (panel) panel.remove(); return; }
  if (!panel) { panel = h('div','',{id:'pos-ord-panel',style:{display:'flex',flexDirection:'column',flex:'1',overflow:'hidden',borderTop:'1px solid var(--t-bd)'}}); mc.appendChild(panel); }
  let posEl = panel.querySelector('#pos-panel');
  if (!state.showPositions) { if (posEl) posEl.remove(); renderMobileBar(); return; }
  if (!posEl) { posEl = h('div','',{id:'pos-panel',style:{display:'flex',flexDirection:'column',overflow:'hidden'}}); panel.prepend(posEl); }
  const openPos = state.positions.filter(p => getNetQty(p) !== 0);
  const closedPos = state.positions.filter(p => getNetQty(p) === 0);
  const totalPnl = [...openPos,...closedPos].reduce((s,p) => s + getPnl(p), 0);
  let html = `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;flex-shrink:0;background:var(--t-sf);border-bottom:1px solid var(--t-bd)">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;font-weight:600;color:var(--t-tx2)">\uD83D\uDCC8 Positions</span>
        <span class="font-mono" style="font-size:12px;font-weight:700;color:${totalPnl>=0?'var(--t-gn)':'var(--t-rd)'}">P&L ${totalPnl>=0?'+':''}\u20B9${totalPnl.toFixed(0)}</span>
      </div>
      <div style="display:flex;gap:6px">
        <button onclick="loadPositions()" style="padding:2px 8px;border-radius:4px;font-size:10px;border:1px solid var(--t-bd);color:var(--t-tx3);background:none;cursor:pointer">\u21BB</button>
        ${openPos.length > 0 ? `<button onclick="closeAllPositions()" style="padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;border:1px solid rgba(239,68,68,.15);color:var(--t-rd);background:rgba(239,68,68,.08);cursor:pointer">Close All</button>` : ''}
      </div>
    </div>`;
  html += `<div style="flex:1;overflow-y:auto;padding:2px 0">`;
  if (state.positions.length === 0) {
    html += `<div style="padding:20px;text-align:center;font-size:11px;color:var(--t-tx3)">No positions today</div>`;
  } else {
    if (openPos.length > 0) {
      html += `<div style="padding:4px 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t-gn);background:rgba(16,185,129,.04);border-bottom:1px solid rgba(16,185,129,.1)">\u25CF Open Positions (${openPos.length})</div>`;
      openPos.forEach((p,i) => {
        const nq = getNetQty(p), pnl = getPnl(p);
        const bq = parseInt(p.flBuyQty??p.cfBuyQty??p.buyQty??0), sq = parseInt(p.flSellQty??p.cfSellQty??p.sellQty??0);
        const ba = parseFloat(p.buyAmt??p.cfBuyAmt??0), sa = parseFloat(p.sellAmt??p.cfSellAmt??0);
        const avgPx = nq>0 ? (bq>0?(ba/bq).toFixed(2):'--') : (sq>0?(sa/sq).toFixed(2):'--');
        const sym = p.trdSym??p.sym??p.tsym??'--';
        const isLong = nq > 0;
        const ltp = state.liveLtps[sym] || (p._ltp?parseFloat(p._ltp):0);
        const ltpStr = ltp > 0 ? ` \u2192 ${ltp.toFixed(2)}` : '';
        html += `<div style="display:grid;align-items:center;gap:8px;padding:6px 12px;font-size:11px;grid-template-columns:1fr auto auto auto;border-bottom:1px solid rgba(36,48,73,.4)">
          <span class="font-mono" style="font-weight:600;font-size:10px;display:flex;align-items:center;gap:6px">${sym}<span style="font-size:8px;padding:1px 6px;border-radius:4px;font-weight:600;${isLong?'background:rgba(16,185,129,.08);color:var(--t-gn)':'background:rgba(239,68,68,.08);color:var(--t-rd)'}">${isLong?'LONG':'SHORT'}</span></span>
          <span class="font-mono" style="font-size:10px;color:var(--t-tx2)">Qty: ${Math.abs(nq)}</span>
          <span class="font-mono" style="font-size:10px;color:var(--t-tx3)">@\u20B9${avgPx}${ltpStr}</span>
          <span class="font-mono" style="font-weight:600;font-size:11px;color:${pnl>=0?'var(--t-gn)':'var(--t-rd)'}">${pnl>=0?'+':'-'}\u20B9${Math.abs(pnl).toFixed(2)}</span>
        </div>`;
      });
    }
    if (closedPos.length > 0) {
      html += `<div style="padding:4px 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t-tx3);background:rgba(100,116,139,.04);border-bottom:1px solid rgba(100,116,139,.1);${openPos.length>0?'border-top:1px solid var(--t-bd)':''}">Closed (${closedPos.length})</div>`;
      closedPos.forEach((p,i) => {
        const pnl = getPnl(p);
        const bq = parseInt(p.flBuyQty??p.cfBuyQty??p.buyQty??0), sq = parseInt(p.flSellQty??p.cfSellQty??p.sellQty??0);
        const ba = parseFloat(p.buyAmt??p.cfBuyAmt??0), sa = parseFloat(p.sellAmt??p.cfSellAmt??0);
        const avgBuy = bq>0?(ba/bq).toFixed(2):'--', avgSell = sq>0?(sa/sq).toFixed(2):'--';
        const sym = p.trdSym??p.sym??p.tsym??'--';
        html += `<div style="display:grid;align-items:center;gap:8px;padding:6px 12px;font-size:11px;grid-template-columns:1fr auto auto auto;border-bottom:1px solid rgba(36,48,73,.4);opacity:.7">
          <span class="font-mono" style="font-weight:600;font-size:10px">${sym}<span style="font-size:8px;padding:1px 6px;margin-left:4px;border-radius:4px;font-weight:600;background:rgba(100,116,139,.08);color:var(--t-tx3)">CLOSED</span></span>
          <span class="font-mono" style="font-size:10px;color:var(--t-tx2)">Qty: ${Math.max(bq,sq)}</span>
          <span class="font-mono" style="font-size:10px;color:var(--t-tx3)">\u20B9${avgBuy}/${avgSell}</span>
          <span class="font-mono" style="font-weight:600;font-size:11px;color:${pnl>=0?'var(--t-gn)':'var(--t-rd)'}">${pnl>=0?'+':'-'}\u20B9${Math.abs(pnl).toFixed(2)}</span>
        </div>`;
      });
    }
  }
  html += `</div>`;
  posEl.innerHTML = html;
  renderMobileBar();
}

function renderOrders() {
  const panel = $('#pos-ord-panel'); if (!panel) return;
  let ordEl = panel.querySelector('#ord-panel');
  if (!state.showOrders) { if (ordEl) ordEl.remove(); return; }
  if (!ordEl) { ordEl = h('div','',{id:'ord-panel',style:{display:'flex',flexDirection:'column',overflow:'hidden'}}); panel.appendChild(ordEl); }
  let html = `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;flex-shrink:0;background:var(--t-sf);border-bottom:1px solid var(--t-bd)">
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--t-tx2)">\uD83D\uDCCB Orders <span style="font-size:9px;padding:1px 6px;border-radius:8px;font-weight:600;background:rgba(59,130,246,.1);color:var(--t-bl)">${state.orders.length}</span></div>
      <button onclick="loadOrders()" style="padding:2px 8px;border-radius:4px;font-size:10px;border:1px solid var(--t-bd);color:var(--t-tx3);background:none;cursor:pointer">\u21BB</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:2px 0">`;
  if (state.orders.length === 0) {
    html += `<div style="padding:20px;text-align:center;font-size:11px;color:var(--t-tx3)">No orders today</div>`;
  } else {
    state.orders.slice(0,50).forEach((o,i) => {
      const isBuy = o.trnsTp === 'B';
      const st = (o.ordSt||'').toLowerCase();
      let stCls = 'pending';
      if (st.includes('reject')) stCls = 'rejected';
      else if (st.includes('complete') || st.includes('traded')) stCls = 'complete';
      else if (st.includes('open') || st.includes('trigger')) stCls = 'open';
      const fillPx = o.flPrc || o.avgPrc;
      let dispPx = '--';
      if (fillPx && parseFloat(fillPx) > 0) dispPx = parseFloat(fillPx).toFixed(2);
      else if (o.prc && parseFloat(o.prc) > 0) dispPx = parseFloat(o.prc).toFixed(2);
      else dispPx = 'MKT';
      const rawT = o.ordTm || o.exTm || o.ordGenTm || '';
      const tm = rawT.match(/(\d{2}:\d{2}:\d{2})/);
      const timeStr = tm ? tm[1] : '';
      const sColors = {complete:{bg:'rgba(16,185,129,.08)',c:'var(--t-gn)'},rejected:{bg:'rgba(239,68,68,.08)',c:'var(--t-rd)'},open:{bg:'rgba(245,158,11,.12)',c:'var(--t-yw)'},pending:{bg:'rgba(59,130,246,.1)',c:'var(--t-bl)'}};
      const sc = sColors[stCls]||sColors.pending;
      const lastCol = stCls === 'open' ?
        `<button onclick="event.stopPropagation();cancelOrd('${o.nOrdNo}')" style="padding:2px 8px;border-radius:4px;font-size:9px;font-weight:600;background:rgba(239,68,68,.08);color:var(--t-rd);border:1px solid rgba(239,68,68,.15);cursor:pointer">\u2715</button>` :
        (timeStr ? `<span class="font-mono" style="font-size:9px;color:var(--t-tx3)">${timeStr}</span>` : '<span></span>');
      html += `<div style="display:grid;align-items:center;gap:8px;padding:6px 12px;font-size:11px;grid-template-columns:18px 1fr auto auto auto auto;border-bottom:1px solid rgba(36,48,73,.4)">
        <div style="width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;${isBuy?'background:rgba(16,185,129,.08);color:var(--t-gn)':'background:rgba(239,68,68,.08);color:var(--t-rd)'}">${isBuy?'B':'S'}</div>
        <span class="font-mono" style="font-weight:500;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.trdSym}</span>
        <span class="font-mono" style="font-weight:600;font-size:10px;color:var(--t-yw)">${dispPx}</span>
        <span class="font-mono" style="font-size:10px;color:var(--t-tx2)">${o.qty}</span>
        <span style="font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;background:${sc.bg};color:${sc.c}">${o.ordSt}</span>
        ${lastCol}
      </div>`;
    });
  }
  html += `</div>`;
  ordEl.innerHTML = html;
}

  const s = state.selectedStrike;
  const hasCe = s && s.ce_ts;

  const closedPos = state.positions.filter(p => getNetQty(p) === 0);
  const totalPnl = [...openPos,...closedPos].reduce((s,p) => s+getPnl(p), 0);
  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 12px;border-bottom:1px solid var(--t-bd)">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="font-mono" style="font-size:12px">
          ${s ? `<span style="color:var(--t-yw)">\u25C9 ${fmtStrike(s.strike)}</span>` : `<span style="font-style:italic;font-size:10px;color:var(--t-tx3)">No strike</span>`}
        </div>
        <span class="font-mono" style="font-size:10px;font-weight:700;color:${totalPnl>0?'var(--t-gn)':totalPnl<0?'var(--t-rd)':'var(--t-tx3)'}">P&L ${totalPnl>=0?'+':''}\u20B9${totalPnl.toFixed(0)}</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <span style="font-size:9px;font-weight:600;text-transform:uppercase;color:var(--t-tx3)">Lots</span>
        <button onclick="state.lots=Math.max(1,state.lots-1);updatePrecomputed();renderActionBar();renderMobileBar();" style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:4px;font-weight:700;font-size:14px;background:var(--t-sf2);border:1px solid var(--t-bd);color:var(--t-tx);cursor:pointer">\u2212</button>
        <input type="number" value="${state.lots}" onchange="state.lots=Math.max(1,Math.min(50,parseInt(this.value)||1));updatePrecomputed();renderActionBar();renderMobileBar();" class="font-mono" style="width:40px;padding:4px;border-radius:4px;text-align:center;font-size:14px;font-weight:700;outline:none;background:var(--t-bg);border:1px solid var(--t-bd);color:var(--t-tx)">
        <button onclick="state.lots=Math.min(50,state.lots+1);updatePrecomputed();renderActionBar();renderMobileBar();" style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:4px;font-weight:700;font-size:14px;background:var(--t-sf2);border:1px solid var(--t-bd);color:var(--t-tx);cursor:pointer">+</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px;padding-bottom:max(10px,env(safe-area-inset-bottom))">
      <button ${hasCe?'':'disabled'} onclick="fire('B','CE')" class="font-mono" style="padding:16px;border-radius:12px;font-size:15px;font-weight:700;color:white;letter-spacing:.05em;border:none;cursor:pointer;background:linear-gradient(135deg,#10b981,#059669);opacity:${hasCe?1:0.25};box-shadow:${hasCe?'0 3px 12px rgba(16,185,129,.35)':'none'}">BUY CE</button>
      <button ${hasCe?'':'disabled'} onclick="fire('S','CE')" class="font-mono" style="padding:16px;border-radius:12px;font-size:15px;font-weight:700;color:white;letter-spacing:.05em;border:none;cursor:pointer;background:linear-gradient(135deg,#ef4444,#dc2626);opacity:${hasCe?1:0.25};box-shadow:${hasCe?'0 3px 12px rgba(239,68,68,.35)':'none'}">SELL CE</button>
      <button ${hasPe?'':'disabled'} onclick="fire('B','PE')" class="font-mono" style="padding:16px;border-radius:12px;font-size:15px;font-weight:700;color:white;letter-spacing:.05em;border:none;cursor:pointer;background:linear-gradient(135deg,#10b981,#059669);opacity:${hasPe?1:0.25};box-shadow:${hasPe?'0 3px 12px rgba(16,185,129,.35)':'none'}">BUY PE</button>
      <button ${hasPe?'':'disabled'} onclick="fire('S','PE')" class="font-mono" style="padding:16px;border-radius:12px;font-size:15px;font-weight:700;color:white;letter-spacing:.05em;border:none;cursor:pointer;background:linear-gradient(135deg,#ef4444,#dc2626);opacity:${hasPe?1:0.25};box-shadow:${hasPe?'0 3px 12px rgba(239,68,68,.35)':'none'}">SELL PE</button>
    </div>
  `;
}

function renderToasts() {
  let c = $('#toast-container');
  if (!c) { c = h('div','',{id:'toast-container',style:{position:'fixed',bottom:'16px',right:'16px',zIndex:999,display:'flex',flexDirection:'column-reverse',gap:'6px',pointerEvents:'none'}}); document.body.appendChild(c); }
  const icons = {success:'\u2705',error:'\u274C',info:'\u2139\uFE0F'};
  const styles = {
    success:{bg:'rgba(16,185,129,.15)',color:'var(--t-gn)',border:'rgba(16,185,129,.15)'},
    error:{bg:'rgba(239,68,68,.15)',color:'var(--t-rd)',border:'rgba(239,68,68,.15)'},
    info:{bg:'rgba(59,130,246,.15)',color:'var(--t-bl)',border:'rgba(59,130,246,.2)'},
  };
  c.innerHTML = state.toasts.map(t => {
    const s = styles[t.type]||styles.info;
    return `<div class="animate-toast-in" style="display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:8px;font-size:12px;font-weight:500;max-width:360px;backdrop-filter:blur(4px);background:${s.bg};color:${s.color};border:1px solid ${s.border};box-shadow:0 4px 12px rgba(0,0,0,.4)"><span style="font-size:14px;flex-shrink:0">${icons[t.type]}</span><span style="flex:1">${t.msg}</span></div>`;
  }).join('');
}

document.addEventListener('keydown', e => {
  if (state.authStep !== 'terminal') return;
  if (['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.code === 'Numpad1' || (e.key === '1' && !e.ctrlKey && !e.altKey && !e.metaKey)) { e.preventDefault(); fire('B','CE'); }
  else if (e.code === 'Numpad3' || (e.key === '3' && !e.ctrlKey && !e.altKey && !e.metaKey)) { e.preventDefault(); fire('S','CE'); }
  else if (e.code === 'Numpad7' || (e.key === '7' && !e.ctrlKey && !e.altKey && !e.metaKey)) { e.preventDefault(); fire('B','PE'); }
  else if (e.code === 'Numpad9' || (e.key === '9' && !e.ctrlKey && !e.altKey && !e.metaKey)) { e.preventDefault(); fire('S','PE'); }
});

function tickClock() {
  const n = new Date();
  state.clock = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0') + ':' + String(n.getSeconds()).padStart(2,'0');
  const el = $('#clock-el');
  if (el) el.textContent = state.clock;
}
tickClock();
clockIv = setInterval(tickClock, 1000);

(function init() {
  if (loadSavedCredentials()) {
    state.authStep = 'totp';
  }
  render();
})();
</script>
</body>
</html>
